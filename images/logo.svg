<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- House roof outline -->
  <polyline points="40,72 80,36 120,72" fill="none" stroke="#222222" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- House chimney -->
  <rect x="100" y="38" width="8" height="16" fill="#222222" rx="1"/>
  <!-- Window in roof -->
  <rect x="73" y="50" width="14" height="10" rx="2" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
  <line x1="80" y1="50" x2="80" y2="60" stroke="#C9A96E" stroke-width="1.5"/>
  <line x1="73" y1="55" x2="87" y2="55" stroke="#C9A96E" stroke-width="1.5"/>

  <!-- Letter B -->
  <text x="42" y="100" font-family="Arial Black, Arial" font-weight="900" font-size="42" fill="#111111" letter-spacing="-2">B</text>

  <!-- Letter P in gold -->
  <text x="80" y="100" font-family="Arial Black, Arial" font-weight="900" font-size="42" fill="#C9A96E" letter-spacing="-2">P</text>

  <!-- BASPANA text -->
  <text x="145" y="75" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="#111111" letter-spacing="3">BASPANA</text>

  <!-- Decorative lines around PRO -->
  <line x1="145" y1="88" x2="175" y2="88" stroke="#C9A96E" stroke-width="1.5"/>
  <text x="178" y="97" font-family="Arial, sans-serif" font-weight="900" font-size="18" fill="#C9A96E" letter-spacing="5">PRO</text>
  <line x1="218" y1="88" x2="248" y2="88" stroke="#C9A96E" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="148" y="112" font-family="Arial, sans-serif" font-weight="400" font-size="8.5" fill="#555555" letter-spacing="1.5">РЕМОНТ • КАЧЕСТВО • ДОВЕРИЕ</text>
</svg>
